<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로또번호 추첨기</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <h1>로또번호 추첨기</h1>
      <p>아래 버튼을 눌러 1부터 45까지의 로또 번호 6개를 무작위로 생성합니다.</p>

      <div class="controls">
        <button id="drawButton">번호 생성</button>
      </div>

      <section class="result-card">
        <h2>당첨 번호</h2>
        <div id="lottoBalls" class="ball-list" aria-live="polite"></div>
      </section>

      <section class="info-card">
        <p>생성된 번호는 중복 없이 오름차순으로 정렬됩니다.</p>
      </section>
    </main>

    <script src="main.js"></script>
  </body>
</html>
